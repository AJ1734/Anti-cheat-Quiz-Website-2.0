<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login | Quiz Portal</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="admin-login.html" class="admin-trigger" id="adminTrigger">NGC</a>

  <header style="padding: 1rem 2rem; border-bottom: 1px solid var(--border); background: var(--bg-secondary);">
    <a href="index.html" style="color: var(--text-primary); text-decoration: none;">← Back</a>
  </header>

  <main style="max-width: 440px; margin: 3rem auto; padding: 0 1.5rem;">
    <h1 style="margin-bottom: 1.5rem; font-size: 1.75rem;">Student Login</h1>

    <div id="errorMsg" class="hidden" style="padding: 0.75rem; background: rgba(239,68,68,0.2); border: 1px solid var(--danger); border-radius: 8px; color: var(--danger); margin-bottom: 1rem;"></div>

    <form id="loginForm" class="card">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" required placeholder="Enter full name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@vitapstudent.ac.in">
      </div>
      <div class="form-group">
        <label for="regNo">Registration Number</label>
        <input type="text" id="regNo" required placeholder="e.g. 23BCE7372" maxlength="12">
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Login</button>
    </form>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth-validation.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
