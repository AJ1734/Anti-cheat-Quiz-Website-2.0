<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Blocked | Quiz Portal</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header style="padding: 1rem 2rem; border-bottom: 1px solid var(--border); background: var(--bg-secondary);">
    <h1 style="font-size: 1.25rem;">Quiz Portal</h1>
  </header>

  <main style="max-width: 520px; margin: 4rem auto; padding: 0 1.5rem; text-align: center;">
    <div class="card" style="padding: 2rem;">
      <h2 style="color: var(--danger); margin-bottom: 1rem;">Quiz Terminated</h2>
      <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
        Your quiz has been closed due to a violation of the test rules. Your attempt has been recorded and your access to this quiz is blocked. Contact your administrator if you believe this was an error.
      </p>
      <a href="user-dashboard.html" class="btn btn-primary" style="text-decoration: none;">Back to Dashboard</a>
    </div>
  </main>
</body>
</html>
