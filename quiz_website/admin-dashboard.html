<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Quiz Portal</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header style="padding: 1rem 2rem; border-bottom: 1px solid var(--border); background: var(--bg-secondary); display: flex; justify-content: space-between; align-items: center;">
    <h1 style="font-size: 1.25rem;">Admin Dashboard</h1>
    <a href="index.html" class="btn btn-secondary" style="text-decoration: none;" onclick="sessionStorage.removeItem('quiz_admin')">Logout</a>
  </header>

  <main style="max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem;">
    <section class="card mb-2" style="margin-bottom: 2rem;">
      <h2 style="margin-bottom: 1rem;">Create Quiz</h2>
      <div class="form-group">
        <label for="quizTitle">Quiz Title</label>
        <input type="text" id="quizTitle" placeholder="e.g. Mid-Term Assessment">
      </div>
      <div class="form-group" style="display: flex; gap: 1rem;">
        <div style="flex: 1;">
          <label for="quizMinutes">Minutes</label>
          <input type="number" id="quizMinutes" min="0" value="10">
        </div>
        <div style="flex: 1;">
          <label for="quizSeconds">Seconds</label>
          <input type="number" id="quizSeconds" min="0" value="0">
        </div>
      </div>
      <div id="questionsContainer"></div>
      <button type="button" id="addQuestionBtn" class="btn btn-secondary mt-2">+ Add Question</button>
      <button type="button" id="saveQuizBtn" class="btn btn-primary mt-2" style="margin-left: 0.5rem;">Save Quiz</button>
    </section>

    <section class="card mb-2">
      <h2 style="margin-bottom: 1rem;">Quizzes</h2>
      <div id="quizzesList"></div>
    </section>

    <section class="card mt-2">
      <h2 style="margin-bottom: 1rem;">Users & Attempts</h2>
      <p style="color: var(--text-secondary); margin-bottom: 1rem;">Select a quiz to see attempts. Use "Reset attempt" to allow a user to retake. Download results as Excel for the selected quiz.</p>
      <div style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; margin-bottom: 1rem;">
        <div class="form-group" style="max-width: 300px; margin-bottom: 0;">
          <label for="filterQuiz">Filter by Quiz</label>
          <select id="filterQuiz"></select>
        </div>
        <button type="button" id="downloadExcelBtn" class="btn btn-primary" style="display: none;">Download results (Excel)</button>
      </div>
      <div id="attemptsList"></div>
    </section>
  </main>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/admin-dashboard.js"></script>
</body>
</html>
